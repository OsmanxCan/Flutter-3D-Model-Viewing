name: model_viewer
description: "A new Flutter project."

publish_to: 'none' 


version: 1.0.0+1

environment:
  sdk: ^3.10.7


dependencies:
  flutter:
    sdk: flutter
  
  
  # UI & animations
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  
  # File handling
  path_provider: ^2.1.1
  
  # State management
  provider: ^6.1.1
  
  # Utils
  vector_math: ^2.1.4

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  three_js: ^0.3.0
  three_js_simple_loaders: ^0.3.0
  three_js_helpers: ^0.3.0
  file_picker: ^11.0.2
  window_manager: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^6.0.0


flutter:

  
  uses-material-design: true

  
  assets:
      - assets/models/f16.glb
      - assets/models/F16.stl